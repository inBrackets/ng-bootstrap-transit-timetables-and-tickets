<div class="list-group-item list-group-item-action border-0 border-bottom py-3">
  <div class="d-flex justify-content-between align-items-start gap-3">
    <div class="flex-grow-1">
      <div class="d-flex align-items-center gap-2 mb-1">
        <i class="bi {{ typeIcon }} fs-5"></i>
        <span class="badge bg-light text-dark border small">{{ typeLabel }}</span>
        <span class="fw-semibold">{{ item().label }}</span>
      </div>

      <div class="d-flex align-items-center gap-2 text-muted small mb-1">
        <i class="bi bi-geo-alt"></i>
        <span class="fw-medium text-dark">{{ item().from }}</span>
        <i class="bi bi-arrow-right"></i>
        <span class="fw-medium text-dark">{{ item().to }}</span>
      </div>

      <div class="text-muted small">
        <i class="bi bi-calendar3 me-1"></i>
        {{ formatDateTime(item().departure) }}
        <span class="mx-1">→</span>
        {{ formatTime(item().arrival) }}
        <span class="ms-2 badge bg-light text-muted border">{{ duration }}</span>
      </div>
    </div>

    <div class="d-flex flex-column align-items-end gap-2 flex-shrink-0">
      <span class="fs-5 fw-bold text-dark">€{{ item().price }}</span>
      <button class="btn btn-sm btn-outline-danger" (click)="remove()"
              [ngbTooltip]="'Remove from basket'">
        <i class="bi bi-trash3"></i>
      </button>
    </div>
  </div>
</div>
